<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>サコス AI アシスタント ｜ Copilot Studio 操作デモ</title>
<meta name="robots" content="noindex">
</head>
<body>
<style>
  :root{
    --ground:#F4F6FB; --surface:#FFFFFF; --surface-2:#FAFBFE;
    --ink:#16203B; --ink-2:#46506B; --muted:#7E89A3;
    --navy:#16203B; --navy-soft:#243250;
    --accent:#E8732A; --accent-ink:#B9551A; --accent-soft:#FCE9DC;
    --ok:#1F9D6B; --ok-soft:#E3F4EC; --warn:#C9871A;
    --line:#E3E7F1; --line-2:#EDEFF6;
    --good:#1F9D6B; --mid:#C9871A; --low:#8A93A8;
    --shadow:0 1px 2px rgba(22,32,59,.06),0 6px 22px rgba(22,32,59,.08);
    --radius:14px;
    --font:"Meiryo","メイリオ","Hiragino Kaku Gothic ProN","ヒラギノ角ゴ ProN W3",system-ui,-apple-system,"Segoe UI",sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--font);
    font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  .app{display:grid;grid-template-columns:64px minmax(0,1fr) 312px;height:100vh;min-height:560px;}

  /* ---- left rail ---- */
  .rail{background:var(--navy);display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 0 16px;}
  .rail .logo{font-weight:700;font-size:9.5px;color:#fff;letter-spacing:.05em;text-align:center;line-height:1.1;margin-bottom:10px;}
  .rail .logo b{display:block;font-size:16px;letter-spacing:.01em;}
  .rail .ri{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#9FAAC6;
    background:transparent;border:none;cursor:default;position:relative;padding:0;}
  .rail .ri svg{width:21px;height:21px;display:block}
  .rail .ri.on{background:rgba(255,255,255,.13);color:#fff;}
  .rail .ri.on::before{content:"";position:absolute;left:-10px;top:11px;width:3px;height:22px;border-radius:0 3px 3px 0;background:var(--accent);}
  .rail .spacer{flex:1}

  /* ---- center chat ---- */
  .chat{display:flex;flex-direction:column;min-width:0;background:var(--ground);}
  .topbar{display:flex;align-items:center;gap:12px;padding:13px 22px;background:var(--surface);border-bottom:1px solid var(--line);}
  .cmark{width:38px;height:38px;border-radius:10px;flex:none;
    background:conic-gradient(from 210deg at 50% 50%,#2aa9ff,#37d39b,#ffd23f,#ff5d8f,#7b5cff,#2aa9ff);
    position:relative;}
  .cmark::after{content:"";position:absolute;inset:9px;border-radius:5px;background:var(--surface);
    -webkit-mask:radial-gradient(circle at 30% 30%,#000 38%,transparent 39%);}
  .cmark span{position:absolute;inset:0;display:grid;place-items:center;color:#16203B;font-size:17px;font-weight:700;}
  .agent{display:flex;align-items:center;gap:11px;min-width:0}
  .agent .nm{font-weight:700;font-size:15.5px;line-height:1.2}
  .agent .sub{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block}
  .topbar .grow{flex:1}
  .demobadge{font-size:11px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);
    border:1px solid #F3D2BC;padding:4px 10px;border-radius:999px;letter-spacing:.02em;}
  .reset{font:inherit;font-size:12.5px;color:var(--ink-2);background:var(--surface);border:1px solid var(--line);
    padding:7px 13px;border-radius:9px;cursor:pointer;font-weight:600;}
  .reset:hover{background:var(--surface-2);border-color:#D4DAE8}

  .thread{flex:1;overflow-y:auto;padding:24px 22px 8px;scroll-behavior:smooth;}
  .thread .inner{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
  .msg{display:flex;gap:12px;align-items:flex-start;animation:rise .32s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg .av{width:34px;height:34px;border-radius:9px;flex:none;margin-top:2px}
  .msg.ai .av{background:conic-gradient(from 210deg at 50% 50%,#2aa9ff,#37d39b,#ffd23f,#ff5d8f,#7b5cff,#2aa9ff);position:relative}
  .msg.ai .av::after{content:"";position:absolute;inset:8px;border-radius:4px;background:var(--surface)}
  .msg.me{flex-direction:row-reverse}
  .msg.me .av{background:var(--navy-soft);color:#fff;display:grid;place-items:center;font-size:12.5px;font-weight:700}
  .bubble{background:var(--surface);border:1px solid var(--line);border-radius:4px 14px 14px 14px;
    padding:12px 15px;box-shadow:var(--shadow);max-width:680px;}
  .msg.me .bubble{background:var(--navy);color:#EAF0FF;border:none;border-radius:14px 4px 14px 14px;}
  .who{font-size:11.5px;color:var(--muted);margin:0 6px 5px;}
  .msg.me .col{align-items:flex-end;display:flex;flex-direction:column}

  .typing{display:flex;gap:5px;padding:5px 2px}
  .typing i{width:8px;height:8px;border-radius:50%;background:#C2C9DA;animation:bounce 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

  /* ---- adaptive card ---- */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;max-width:680px;}
  .card .ch{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-2);
    background:var(--surface-2);}
  .card .ch .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px;
    background:var(--navy);color:#fff;flex:none}
  .card .ch .tt{font-weight:700;font-size:14.5px;line-height:1.25}
  .card .ch .tt small{display:block;font-weight:500;font-size:11.5px;color:var(--muted)}
  .card .cb{padding:14px 16px}
  .lead{font-size:13.5px;color:var(--ink-2);margin:0 0 12px}

  table.t{width:100%;border-collapse:collapse;font-size:13px;font-variant-numeric:tabular-nums;}
  table.t th{text-align:left;font-size:11px;letter-spacing:.03em;color:var(--muted);font-weight:700;
    padding:7px 9px;border-bottom:1.5px solid var(--line);white-space:nowrap}
  table.t td{padding:9px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  table.t tr:last-child td{border-bottom:none}
  table.t td.num,table.t th.num{text-align:right}
  .rank{width:22px;height:22px;border-radius:7px;background:var(--navy);color:#fff;font-size:12px;font-weight:700;
    display:inline-grid;place-items:center}
  .sub2{display:block;font-size:11px;color:var(--muted)}
  .score{font-weight:700;padding:2px 9px;border-radius:999px;font-size:12px;font-variant-numeric:tabular-nums}
  .score.g{background:var(--ok-soft);color:var(--ok)} .score.m{background:#FBF1DC;color:var(--mid)}
  .score.l{background:#EEF0F5;color:var(--low)}
  .pchip{font-weight:700;padding:2px 11px;border-radius:999px;font-size:11.5px}
  .pchip.hi{background:var(--accent-soft);color:var(--accent-ink)} .pchip.mid{background:#FBF1DC;color:var(--mid)}
  code,.mono{font-family:var(--mono);font-size:12.5px;background:#EEF1F8;padding:1px 6px;border-radius:5px;color:var(--navy-soft)}

  .q-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;font-size:12.5px;margin:0 0 12px;
    padding:11px 13px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px}
  .q-meta b{color:var(--muted);font-weight:600;font-size:11px;display:block}
  .q-tot{display:flex;flex-direction:column;gap:3px;align-items:flex-end;margin-top:11px;font-variant-numeric:tabular-nums}
  .q-tot .r{display:flex;gap:26px;font-size:13px;color:var(--ink-2)}
  .q-tot .r.big{font-size:20px;font-weight:700;color:var(--navy);border-top:2px solid var(--line);padding-top:7px;margin-top:3px}
  .q-tot .r.big .lbl{font-size:13px;color:var(--ink-2);align-self:center}

  .cf{display:flex;flex-wrap:wrap;gap:8px;padding:13px 16px;border-top:1px solid var(--line-2);background:var(--surface-2)}
  .btn{font:inherit;font-size:12.5px;font-weight:700;border-radius:9px;padding:9px 14px;cursor:pointer;border:1px solid transparent}
  .btn.pri{background:var(--accent);color:#fff} .btn.pri:hover{background:var(--accent-ink)}
  .btn.gho{background:var(--surface);color:var(--ink-2);border-color:var(--line)} .btn.gho:hover{background:#fff;border-color:#CFD6E6}
  .btn:disabled{opacity:.5;cursor:default}

  .saved{display:flex;align-items:center;gap:11px;background:var(--ok-soft);border:1px solid #BFE6D2;border-radius:12px;padding:12px 14px}
  .saved .od{width:30px;height:30px;border-radius:7px;background:#0364B8;color:#fff;display:grid;place-items:center;font-size:15px;flex:none}
  .saved .fn{font-weight:700;font-size:13px;color:var(--navy)} .saved .fp{font-size:11.5px;color:var(--ink-2)}
  .saved .ok{margin-left:auto;color:var(--ok);font-weight:700;font-size:12.5px;white-space:nowrap}

  .cite{display:flex;flex-direction:column;gap:7px;margin-top:13px;padding-top:12px;border-top:1px dashed var(--line)}
  .cite .lab{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.03em}
  .src{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--line-2);
    border-radius:9px;padding:8px 11px;font-size:12.5px;color:var(--navy-soft);text-decoration:none;font-weight:600}
  .src:hover{border-color:#CFD6E6}.src .fi{font-size:14px}
  .ol{margin:0;padding-left:1.2em;font-size:13.5px;color:var(--ink)} .ol li{margin:5px 0}
  .note{font-size:12px;color:var(--muted);margin-top:10px}

  /* ---- composer ---- */
  .composer{padding:12px 22px 18px;background:var(--ground)}
  .composer .wrap{max-width:820px;margin:0 auto}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .chip{font:inherit;font-size:12.5px;color:var(--navy-soft);background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:8px 14px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
  .chip:hover{border-color:var(--accent);color:var(--accent-ink)}
  .chip .n{width:18px;height:18px;border-radius:6px;background:var(--accent-soft);color:var(--accent-ink);font-size:11px;
    display:grid;place-items:center;font-weight:700}
  .inputrow{display:flex;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--line);
    border-radius:13px;padding:7px 7px 7px 16px;box-shadow:var(--shadow)}
  .inputrow:focus-within{border-color:var(--accent)}
  .inputrow input{flex:1;border:none;outline:none;font:inherit;font-size:14px;background:transparent;color:var(--ink)}
  .send{width:40px;height:40px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:17px;cursor:pointer;flex:none}
  .send:hover{background:var(--accent-ink)}

  /* ---- right actions ---- */
  .actions{background:var(--surface);border-left:1px solid var(--line);padding:20px 18px;overflow-y:auto}
  .actions h3{font-size:12px;letter-spacing:.04em;color:var(--muted);margin:0 0 13px;text-transform:none}
  .fcard{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;
    background:var(--surface);cursor:pointer;transition:border-color .15s,transform .15s}
  .fcard.live:hover{border-color:var(--accent);transform:translateY(-1px)}
  .fcard.soft{opacity:.72;cursor:default}
  .fcard .fn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:14px;font-weight:700;color:#fff;flex:none}
  .fcard .tx b{font-size:13px;display:block;line-height:1.25} .fcard .tx span{font-size:11.5px;color:var(--muted)}
  .tagline{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;margin-top:5px;display:inline-block}
  .tag-live{background:var(--accent-soft);color:var(--accent-ink)} .tag-std{background:#EAF1FB;color:#2c5d9e}
  .actions .foot{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.5;border-top:1px solid var(--line-2);padding-top:12px}

  @media(max-width:1080px){ .app{grid-template-columns:64px 1fr} .actions{display:none} }
  @media(max-width:680px){ .app{grid-template-columns:1fr} .rail{display:none} .bubble,.card{max-width:100%} }
  @media(prefers-reduced-motion:reduce){ *{animation-duration:.001s!important} .thread{scroll-behavior:auto} }
</style>

<div class="app">
  <aside class="rail" aria-hidden="true">
    <div class="logo"><b>SACOS</b>レンタル</div>
    <div class="ri" title="チャット"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 9 9 0 0 1-3.9-.9L3 21l1.9-5.6A8.4 8.4 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.4 8.4 0 0 1 21 11.5z"/></svg></div>
    <div class="ri" title="予定表"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16" rx="2"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></svg></div>
    <div class="ri on" title="AIアシスタント"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.7 5.4a4 4 0 0 0 2.9 2.9L22 12l-5.4 1.7a4 4 0 0 0-2.9 2.9L12 22l-1.7-5.4a4 4 0 0 0-2.9-2.9L2 12l5.4-1.7a4 4 0 0 0 2.9-2.9L12 2z"/></svg></div>
    <div class="ri" title="ファイル"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h3.6l2 2.4H19a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg></div>
    <div class="spacer"></div>
    <div class="ri" title="アカウント"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.5" r="3.5"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg></div>
  </aside>

  <main class="chat">
    <header class="topbar">
      <div class="cmark"><span>✦</span></div>
      <div class="agent">
        <div>
          <div class="nm">サコス AI アシスタント</div>
          <div class="sub"><span class="dot"></span>オンライン ・ Microsoft Teams ／ Copilot Studio</div>
        </div>
      </div>
      <div class="grow"></div>
      <span class="demobadge">DEMO ／ サンプルデータ</span>
      <button class="reset" id="reset">会話をリセット</button>
    </header>

    <div class="thread" id="thread"><div class="inner" id="inner"></div></div>

    <div class="composer">
      <div class="wrap">
        <div class="chips" id="chips"></div>
        <div class="inputrow">
          <input id="input" type="text" autocomplete="off"
            placeholder="メッセージを入力（例：油圧ショベルの仕入先を教えて）" aria-label="メッセージ入力">
          <button class="send" id="send" aria-label="送信">➤</button>
        </div>
      </div>
    </div>
  </main>

  <aside class="actions">
    <h3>利用できる機能</h3>
    <div class="fcard live" data-go="suppliers">
      <div class="fn" style="background:#16203B">①</div>
      <div class="tx"><b>取引先検索</b><span>品目から最適な仕入先を抽出</span>
        <div class="tagline tag-live">先行実装</div></div>
    </div>
    <div class="fcard live" data-go="quote">
      <div class="fn" style="background:#E8732A">②</div>
      <div class="tx"><b>見積書作成支援</b><span>案件情報からExcel見積を自動生成</span>
        <div class="tagline tag-live">先行実装</div></div>
    </div>
    <div class="fcard live" data-go="manual">
      <div class="fn" style="background:#2c5d9e">③</div>
      <div class="tx"><b>マニュアル・規定参照</b><span>社内文書をAIが検索し即回答</span>
        <div class="tagline tag-live">先行実装</div></div>
    </div>
    <div class="fcard live" data-go="sales">
      <div class="fn" style="background:#1F9D6B">④</div>
      <div class="tx"><b>営業支援（行動予定）</b><span>SFA連携で今週の最適訪問先を提案</span>
        <div class="tagline tag-live">先行実装</div></div>
    </div>
    <div class="foot">※ 本デモはサンプルデータによる動作イメージです。実データ連携・出力フォーマットは要件に合わせて設計します。</div>
  </aside>
</div>

<script>
(function(){
  var inner=document.getElementById('inner'), thread=document.getElementById('thread');
  var input=document.getElementById('input'), reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var busy=false;
  function scroll(){ thread.scrollTop=thread.scrollHeight; }
  function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
  function yen(n){ return '¥'+n.toLocaleString('ja-JP'); }

  function addUser(text){
    var m=el('div','msg me'); var col=el('div','col');
    col.appendChild(el('div','who','あなた'));
    var b=el('div','bubble'); b.textContent=text; col.appendChild(b);
    m.appendChild(el('div','av','横')); m.appendChild(col); inner.appendChild(m); scroll();
  }
  function aiShell(){
    var m=el('div','msg ai'); var col=el('div','col');
    col.appendChild(el('div','who','サコス AI アシスタント'));
    m.appendChild(el('div','av')); m.appendChild(col); inner.appendChild(m); return col;
  }
  function typing(cb){
    var col=aiShell(); var b=el('div','bubble'); b.appendChild(el('div','typing','<i></i><i></i><i></i>'));
    col.appendChild(b); scroll();
    setTimeout(function(){ col.parentNode.removeChild(col); cb(); }, reduce?120:850);
  }
  function aiSay(node){ var col=aiShell(); if(typeof node==='string'){var b=el('div','bubble');b.innerHTML=node;col.appendChild(b);} else col.appendChild(node); scroll(); }

  /* ---------- 1) suppliers ---------- */
  function cardSuppliers(){
    var rows=[
      [1,'東邦建機リース（株）','佐藤 隆','2026/06/18','142件',98,'g'],
      [2,'関東重機興業（株）','鈴木 美咲','2026/05/30','118件',92,'g'],
      [3,'セントラルマシナリー（株）','田中 健一','2026/04/22','87件',85,'g'],
      [4,'三和レンタル機材（株）','伊藤 直樹','2026/03/15','64件',79,'m'],
      [5,'北斗建設機械（株）','渡辺 亮','2026/02/08','41件',71,'m']
    ];
    var tr=rows.map(function(r){
      return '<tr><td><span class="rank">'+r[0]+'</span></td>'+
        '<td><b>'+r[1]+'</b><span class="sub2">担当：'+r[2]+'</span></td>'+
        '<td>'+r[3]+'</td><td class="num">'+r[4]+'</td>'+
        '<td class="num"><span class="score '+r[6]+'">'+r[5]+'</span></td></tr>';
    }).join('');
    var c=el('div','card');
    c.innerHTML='<div class="ch"><div class="ic">①</div><div class="tt">取引先検索結果'+
      '<small>品目：油圧ショベル（0.25㎥クラス）／ 取引実績スコア順</small></div></div>'+
      '<div class="cb"><p class="lead">過去の発注履歴・取引量・納期実績をもとに、取引実績上位5社をスコア付きで抽出しました。</p>'+
      '<table class="t"><thead><tr><th></th><th>仕入先 ／ 担当者</th><th>直近発注</th>'+
      '<th class="num">取引実績</th><th class="num">スコア</th></tr></thead><tbody>'+tr+'</tbody></table>'+
      '<p class="note">※ スコア＝発注頻度・金額・納期遵守率・直近取引からの経過日数を合成した社内指標（100点満点）。</p></div>';
    return c;
  }

  /* ---------- 2) quote ---------- */
  var quote={ days:14, items:[
    {name:'高所作業車（垂直マスト式 10m）', unit:8500, qty:2, rental:true},
    {name:'発電機（3kVA・防音型）', unit:2200, qty:1, rental:true},
    {name:'運搬費（往復・現場渡し）', unit:45000, qty:1, rental:false}
  ]};
  function cardQuote(noteHtml){
    var sub=0;
    var body=quote.items.map(function(it){
      var amt= it.rental ? it.unit*it.qty*quote.days : it.unit*it.qty;
      sub+=amt;
      return '<tr><td><b>'+it.name+'</b></td>'+
        '<td class="num">'+yen(it.unit)+(it.rental?'<span class="sub2">/台・日</span>':'<span class="sub2">/式</span>')+'</td>'+
        '<td class="num">'+it.qty+(it.rental?'台':'式')+'</td>'+
        '<td class="num">'+(it.rental?quote.days+'日':'—')+'</td>'+
        '<td class="num">'+yen(amt)+'</td></tr>';
    }).join('');
    var tax=Math.round(sub*0.1), tot=sub+tax;
    var c=el('div','card');
    c.innerHTML='<div class="ch"><div class="ic" style="background:#E8732A">②</div><div class="tt">御見積書（ドラフト）'+
      '<small>みなと第二ビル新築工事</small></div></div>'+
      '<div class="cb">'+(noteHtml?'<p class="lead">'+noteHtml+'</p>':'<p class="lead">案件情報とマスタ（顧客・最新単価）を連携し、見積書ドラフトを自動生成しました。</p>')+
      '<div class="q-meta">'+
        '<div><b>顧客</b>大成フロンティア建設（株）</div>'+
        '<div><b>顧客コード</b><span class="mono">C-10482</span></div>'+
        '<div><b>見積番号</b><span class="mono">Q-2026-0626-018</span></div>'+
        '<div><b>作成日</b>2026/06/26</div>'+
      '</div>'+
      '<table class="t"><thead><tr><th>品目</th><th class="num">単価</th><th class="num">数量</th>'+
      '<th class="num">レンタル日数</th><th class="num">金額</th></tr></thead><tbody>'+body+'</tbody></table>'+
      '<div class="q-tot"><div class="r"><span class="lbl">小計</span><span>'+yen(sub)+'</span></div>'+
        '<div class="r"><span class="lbl">消費税（10%）</span><span>'+yen(tax)+'</span></div>'+
        '<div class="r big"><span class="lbl">合計（税込）</span><span>'+yen(tot)+'</span></div></div>'+
      '</div>'+
      '<div class="cf">'+
        '<button class="btn pri" data-act="save">📥 ExcelをOneDriveに保存</button>'+
        '<button class="btn gho" data-act="days">レンタル日数を30日に変更</button>'+
        '<button class="btn gho" data-act="qty">高所作業車を3台に変更</button>'+
      '</div>';
    c.querySelector('[data-act="save"]').onclick=function(){ if(busy)return; saveQuote(); };
    c.querySelector('[data-act="days"]').onclick=function(){ if(busy)return; quote.days=30; addUser('レンタル日数を30日に変更して'); run(function(){ aiSay(cardQuote('レンタル日数を <b>14日 → 30日</b> に変更し、レンタル品目を再計算しました。')); }); };
    c.querySelector('[data-act="qty"]').onclick=function(){ if(busy)return; quote.items[0].qty=3; addUser('高所作業車を3台に変更して'); run(function(){ aiSay(cardQuote('高所作業車を <b>2台 → 3台</b> に変更し、金額を再計算しました。')); }); };
    return c;
  }
  function saveQuote(){
    addUser('この内容でExcelを保存して');
    run(function(){
      var c=el('div','card'); c.style.maxWidth='560px';
      c.innerHTML='<div class="cb"><div class="saved"><div class="od">⬛</div>'+
        '<div><div class="fn">御見積書_大成フロンティア建設_みなと第二ビル_20260626.xlsx</div>'+
        '<div class="fp">OneDrive ＞ 営業部 ＞ 見積 ＞ 2026 に保存しました</div></div>'+
        '<div class="ok">✓ 保存完了</div></div>'+
        '<p class="note">Teams上のメンバーへ共有可能です。フォーマット（ロゴ・項目・捺印欄）は御社ひな形に合わせて調整できます。</p></div>';
      aiSay(c);
    });
  }

  /* ---------- 3) manual ---------- */
  function cardManual(){
    var c=el('div','card');
    c.innerHTML='<div class="ch"><div class="ic" style="background:#2c5d9e">③</div><div class="tt">マニュアル・規定参照'+
      '<small>機材管理規程／レンタル約款より回答</small></div></div>'+
      '<div class="cb"><p class="lead">レンタル機材が現場で故障した場合の対応手順は次のとおりです。</p>'+
      '<ol class="ol">'+
      '<li>直ちに使用を停止し、二次災害を防ぐため周囲の安全を確保します。</li>'+
      '<li>担当営業所、または24時間サポート窓口（<span class="mono">0120-000-000</span>）へ連絡します。</li>'+
      '<li>代替機の手配を依頼します（在庫があれば翌営業日までに出荷）。</li>'+
      '<li>故障状況を写真撮影し、故障報告書に添付して提出します。</li>'+
      '</ol>'+
      '<p class="note">※ お客様の過失・取扱説明書外の使用による故障は、別途修理費が発生する場合があります（レンタル約款 第12条）。</p>'+
      '<div class="cite"><span class="lab">参照元</span>'+
        '<a class="src" href="#" onclick="return false"><span class="fi">📄</span>機材管理規程 第8条（保守・修理対応）</a>'+
        '<a class="src" href="#" onclick="return false"><span class="fi">📄</span>レンタル約款 v3.2 第12条（故障・破損時の費用負担）</a>'+
      '</div></div>';
    return c;
  }

  /* ---------- 4) sales ---------- */
  function cardSales(){
    var rows=[
      ['高','大成フロンティア建設（株）','山本 修','提案中','32日前','¥4,800,000','更新時期・増設の打診','hi'],
      ['高','関西リース開発（株）','中村 彩','新規','7日前','¥3,400,000','初回提案・デモ機のご案内','hi'],
      ['高','みなと運輸倉庫（株）','佐々木 健','見積提示','18日前','¥2,600,000','見積フォロー・競合状況の確認','hi'],
      ['中','城南建機センター（株）','高橋 学','商談中','41日前','¥1,900,000','離反防止・定期点検のご案内','mid'],
      ['中','北陸土木（株）','小林 大輔','失注復活','60日前','¥1,200,000','再アプローチ・価格見直し提案','mid']
    ];
    var tr=rows.map(function(r){
      return '<tr><td><span class="pchip '+r[7]+'">'+r[0]+'</span></td>'+
        '<td><b>'+r[1]+'</b><span class="sub2">担当：'+r[2]+' ／ 推奨：'+r[6]+'</span></td>'+
        '<td>'+r[3]+'</td><td>'+r[4]+'</td>'+
        '<td class="num">'+r[5]+'</td></tr>';
    }).join('');
    var c=el('div','card');
    c.innerHTML='<div class="ch"><div class="ic" style="background:#1F9D6B">④</div><div class="tt">営業支援（行動予定の最適化）'+
      '<small>SFAデータ × AI ／ 今週アプローチすべき訪問先トップ5</small></div></div>'+
      '<div class="cb"><p class="lead">商談フェーズ・最終接触からの経過日数・想定金額・取引履歴をAIが多角的に分析し、今週の優先訪問先を提案します。</p>'+
      '<table class="t"><thead><tr><th>優先度</th><th>顧客 ／ 担当・推奨トーク</th><th>商談フェーズ</th>'+
      '<th>最終接触</th><th class="num">想定金額</th></tr></thead><tbody>'+tr+'</tbody></table>'+
      '<p class="note">※ 優先度＝商談確度・経過日数・想定金額からAIが自動スコアリング。SFA（営業支援システム）と連携し毎朝自動更新できます。</p></div>';
    return c;
  }

  /* ---------- engine ---------- */
  function run(cb){ busy=true; typing(function(){ cb(); busy=false; }); }
  var scenarios={
    suppliers:{ q:'油圧ショベル（0.25㎥クラス）の仕入先を教えて', card:cardSuppliers },
    quote:{ q:'大成フロンティア建設向けに、高所作業車2台を14日間レンタルする見積を作成して', fn:function(){ quote.days=14; quote.items[0].qty=2; return cardQuote(); } },
    manual:{ q:'レンタル機材が現場で故障したときの対応規定は？', card:cardManual },
    sales:{ q:'今週アプローチすべき訪問先を提案して', card:cardSales }
  };
  function go(key){
    if(busy) return; var s=scenarios[key]; if(!s) return;
    addUser(s.q);
    run(function(){ aiSay(s.fn?s.fn():s.card()); });
  }

  /* chips + actions */
  var chipDefs=[['1','油圧ショベルの仕入先を教えて','suppliers'],
    ['2','高所作業車2台×14日の見積を作成','quote'],
    ['3','機材が故障したときの対応規定は？','manual'],
    ['4','今週の優先訪問先を提案','sales']];
  var chips=document.getElementById('chips');
  chipDefs.forEach(function(d){
    var b=el('button','chip','<span class="n">'+d[0]+'</span>'+d[1]); b.onclick=function(){ go(d[2]); }; chips.appendChild(b);
  });
  Array.prototype.forEach.call(document.querySelectorAll('.fcard.live'),function(f){ f.onclick=function(){ go(f.dataset.go); }; });

  /* free input routing */
  function submit(){
    var t=input.value.trim(); if(!t||busy) return; input.value='';
    var key = /仕入|ショベル|取引先|発注先/.test(t)?'suppliers'
            : /見積|高所作業車|レンタル.*(見積|台)/.test(t)?'quote'
            : /故障|規定|マニュアル|約款/.test(t)?'manual'
            : /訪問|営業|今週|アプローチ|行動予定|優先/.test(t)?'sales':null;
    addUser(t);
    if(key){ run(function(){ var s=scenarios[key]; aiSay(s.fn?s.fn():s.card()); }); }
    else { run(function(){ aiSay('このデモでは <b>①取引先検索 ／ ②見積書作成 ／ ③マニュアル・規定参照 ／ ④営業支援</b> をお試しいただけます。下の候補ボタン、または右の機能パネルからお選びください。'); }); }
  }
  document.getElementById('send').onclick=submit;
  input.addEventListener('keydown',function(e){ if(e.key==='Enter') submit(); });

  function welcome(){
    inner.innerHTML='';
    aiSay('こんにちは、サコス AI アシスタントです。👋<br>営業まわりの定型業務をお手伝いします。下の候補ボタン、または右の<b>「利用できる機能」</b>からお試しください。<br><span class="note">お試しいただける機能：①取引先検索 ②見積書作成 ③マニュアル・規定参照 ④営業支援（行動予定）</span>');
  }
  document.getElementById('reset').onclick=function(){ quote.days=14; quote.items[0].qty=2; busy=false; welcome(); };
  welcome();
})();
</script>
